services:
  db:
    image: postgres:16-alpine
    container_name: yomu-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - yomu-data:/var/lib/postgresql/data

volumes:
  yomu-data: